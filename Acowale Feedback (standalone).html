document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

lex;align-items:center;justify-content:space-between;padding:28px 0 0\">\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <div style=\"width:30px;height:30px;border-radius:8px;background:{{ accent }};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#141414\">A<\u002Fdiv>\n      <span style=\"font-weight:600;font-size:16px;letter-spacing:.2px\">Acowale<\u002Fspan>\n    <\u002Fdiv>\n    <span style=\"font-size:12px;color:rgba(235,236,240,.45)\">Customer feedback<\u002Fspan>\n  <\u002Fheader>\n\n  <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"width:100%;max-width:640px;margin-top:52px;animation:fadeUp .4s ease both\">\n    <h1 style=\"margin:0;font-size:34px;font-weight:700;letter-spacing:-.5px;line-height:1.15;text-wrap:pretty\">Tell us what you think<\u002Fh1>\n    <p style=\"margin:12px 0 0;font-size:15px;line-height:1.55;color:rgba(235,236,240,.55);max-width:46ch\">Your feedback goes straight to the team building Acowale. It takes under a minute.<\u002Fp>\n\n    <div style=\"margin-top:36px;background:#17181d;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:28px;display:flex;flex-direction:column;gap:26px;box-sizing:border-box\">\n      <div style=\"display:flex;flex-direction:column;gap:8px\">\n        <label style=\"font-size:13px;font-weight:600;color:rgba(235,236,240,.8)\">Your email<\u002Flabel>\n        <input type=\"email\" value=\"{{ emailVal }}\" sc-camel-on-change=\"{{ onEmail }}\" placeholder=\"you@company.com\" style=\"background:#101114;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;font-size:15px;color:#ebecf0;font-family:inherit;min-height:44px;box-sizing:border-box\">\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px\">\n        <label style=\"font-size:13px;font-weight:600;color:rgba(235,236,240,.8)\">What is it about?<\u002Flabel>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n          <sc-for list=\"{{ formCats }}\" as=\"c\" hint-placeholder-count=\"5\">\n            <button sc-camel-on-click=\"{{ c.onClick }}\" style=\"min-height:44px;padding:0 16px;border-radius:99px;border:1px solid {{ c.border }};background:{{ c.bg }};color:{{ c.color }};font-size:14px;font-weight:500;font-family:inherit;cursor:pointer\" style-hover=\"border-color:rgba(255,255,255,.35)\">{{ c.name }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px\">\n        <label style=\"font-size:13px;font-weight:600;color:rgba(235,236,240,.8)\">How was your experience?<\u002Flabel>\n        <div style=\"display:flex;gap:6px;align-items:center\">\n          <sc-for list=\"{{ formStars }}\" as=\"s\" hint-placeholder-count=\"5\">\n            <button sc-camel-on-click=\"{{ s.onClick }}\" aria-label=\"{{ s.label }}\" style=\"width:44px;height:44px;border:none;background:none;cursor:pointer;font-size:28px;line-height:1;color:{{ s.color }};padding:0\" style-hover=\"transform:scale(1.15)\">★<\u002Fbutton>\n          <\u002Fsc-for>\n          <span style=\"margin-left:8px;font-size:13px;color:rgba(235,236,240,.45)\">{{ ratingLabel }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px\">\n        <label style=\"font-size:13px;font-weight:600;color:rgba(235,236,240,.8)\">Comments<\u002Flabel>\n        <textarea value=\"{{ commentVal }}\" sc-camel-on-change=\"{{ onComment }}\" placeholder=\"What went well? What could be better?\" rows=\"4\" style=\"background:#101114;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;font-size:15px;line-height:1.5;color:#ebecf0;font-family:inherit;resize:vertical;box-sizing:border-box\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap\">\n        <span style=\ -bottom:28px\">\n      <div style=\"width:44px;height:44px;border-radius:12px;background:{{ accent }};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;color:#141414\">A<\u002Fdiv>\n      <div style=\"text-align:center\">\n        <div style=\"font-size:20px;font-weight:700\">Admin Console<\u002Fdiv>\n        <div style=\"font-size:13px;color:rgba(235,236,240,.45);margin-top:4px\">Sign in to view feedback analytics<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#17181d;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:26px;display:flex;flex-direction:column;gap:18px;box-sizing:border-box\">\n      <div style=\"display:flex;flex-direction:column;gap:7px\">\n        <label style=\"font-size:13px;font-weight:600;color:rgba(235,236,240,.8)\">Email<\u002Flabel>\n        <input type=\"email\" placeholder=\"admin@acowale.com\" style=\"background:#101114;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;font-size:15px;color:#ebecf0;font-family:inherit;min-height:44px;box-sizing:border-box\">\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px\">\n        <label style=\"font-size:13px;font-weight:600;color:rgba(235,236,240,.8)\">Password<\u002Flabel>\n        <input type=\"password\" placeholder=\"••••••••\" style=\"background:#101114;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;font-size:15px;color:#ebecf0;font-family:inherit;min-height:44px;box-sizing:border-box\">\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{ goAdmin }}\" style=\"min-height:46px;border-radius:10px;border:none;background:{{ accent }};color:#141414;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px\" style-hover=\"filter:brightness(1.1)\">Sign in<\u002Fbutton>\n      <div style=\"text-align:center;font-size:12px;color:rgba(235,236,240,.35)\">Prototype — any credentials work<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ ADMIN CONSOLE ============ -->\n<sc-if value=\"{{ screenAdmin }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Admin console\" style=\"min-height:100vh;display:flex;flex-wrap:wrap;align-items:stretch\">\n  <!-- Sidebar -->\n  <nav style=\"flex:1 1 210px;max-width:230px;min-width:190px;background:#141519;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;padding:22px 14px;box-sizing:border-box;gap:6px\">\n    <div style=\"display:flex;align-items:center;gap:10px;padding:0 10px 20px\">\n      <div style=\"width:28px;height:28px;border-radius:8px;background:{{ accent }};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#141414\">A<\u002Fdiv>\n      <span style=\"font-weight:600;font-size:15px\">Acowale<\u002Fspan>\n    <\u002Fdiv>\n    <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"2\">\n      <button sc-camel-on-click=\"{{ n.onClick }}\" style=\"display:flex;align-items:center;gap:11px;min-height:44px;padding:0 12px;border-radius:10px;border:none;background:{{ n.bg }};color:{{ n.color }};font-size:14px;font-weight:{{ n.weight }};font-family:inherit;cursor:pointer;text-align:left;width:100%;box-sizing:border-box\" style-hover=\"background:rgba(255,255,255,.06)\">\n        <span style=\"font-size:15px;width:18px;text-align:center\">{{ n.icon }}<\u002Fspan>{{ n.label }}\n        <sc-if value=\"{{ n.badge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:auto;font-size:11px;font-weight:600;background:rgba(255,255,255,.09);border-radius:99px;padding:2px 8px;color:rgba(235,236,240,.7)\">{{ n.badgeText }}<\u002Fspan><\u002Fsc-if>\n      <\u002Fbutton>\n    <\u002Fsc-for>\n    <div style=\"margin-top:auto;display:flex;flex-direction:column;gap:10px;padding-top:16px;border-top:1px solid rgba(255,255,255,.06)\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:0 10px\">\n        <div style=\"width:30px;height:30px;border-radius:50%;background:#2a2c33;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:rgba(235,236,240,.8)\">CM<\u002Fdiv>\n        <div style=\"min-width:0\">\n          <div style=\"font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">Crisbin M.<\u002Fdiv>\n          <div style=\"font-size:11px;color:rgba(235,236,240,.4)\">Admin<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{ goLogin }}\" style=\"min-height:38px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:none;color:rgba(235,236,240,.6);font-size:13px;font-family:inherit;cursor:pointer\" style-hover=\"border-color:rgba(255,255,255,.3);color:#ebecf0\">Log out<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- Main -->\n  <main style=\"flex:100 1 560px;min-width:0;padding:28px 32px 110px;box-sizing:border-box\">\n\n    <!-- OVERVIEW -->\n    <sc-if value=\"{{ tabOverview }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Admin · Overview\" style=\"animation:fadeUp .3s ease both\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:24px\">\n        <h1 style=\"margin:0;font-size:24px;font-weight:700;letter-spacing:-.3px\">Overview<\u002Fh1>\n        <span style=\"font-size:13px;color:rgba(235,236,240,.4)\">Last 30 days<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px\">\n        <sc-for list=\"{{ statCards }}\" as=\"st\" hint-placeholder-count=\"4\">\n          <div style=\"background:#17181d;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 20px;box-sizing:border-box\">\n            <div style=\"font-size:12.5px;font-weight:500;color:rgba(235,236,240,.5)\">{{ st.label }}<\u002Fdiv>\n            <div style=\"font-size:30px;font-weight:700;letter-spacing:-.5px;margin-top:6px\">{{ st.value }}<\u002Fdiv>\n            <div style=\"font-size:12px;margin-top:4px;color:{{ st.subColor }}\">{{ st.sub }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-top:14px\">\n        <div style=\"background:#17181d;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:22px;box-sizing:border-box\">\n          <div style=\"font-size:15px;font-weight:600;margin-bottom:18px\">By category<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <sc-for list=\"{{ catStats }}\" as=\"c\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;flex-direction:column;gap:6px\">\n                <div style=\"display:flex;justify-content:space-between;font-size:13px\">\n                  <span style=\"display:flex;align-items:center;gap:8px\"><span style=\"width:8px;height:8px;border-radius:2px;background:{{ c.color }}\"><\u002Fspan>{{ c.name }}<\u002Fspan>\n                  <span style=\"color:rgba(235,236,240,.5)\">{{ c.count }} · {{ c.pctText }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"height:6px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden\">\n                  <div style=\"height:100%;border-radius:99px;background:{{ c.color }};width:{{ c.w }}\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#17181d;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:22px;box-sizing:border-box\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px\">\n            <div style=\"font-size:15px;font-weight:600\">Recent submissions<\u002Fdiv>\n            <button sc-camel-on-click=\"{{ goFeedbackTab }}\" style=\"border:none;background:none;color:{{ accent }};font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;padding:0\" style-hover=\"text-decoration:underline\">View all →<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column\">\n            <sc-for list=\"{{ recent }}\" as=\"r\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)\">\n                <div style=\"width:32px;height:32px;border-radius:50%;background:#22242b;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:rgba(235,236,240,.75);flex:none\">{{ r.initial }}<\u002Fdiv>\n                <div style=\"min-width:0;flex:1\">\n                  <div style=\"font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ r.comment }}<\u002Fdiv>\n                  <div style=\"font-size:11.5px;color:rgba(235,236,240,.4);margin-top:2px\">{{ r.email }} · {{ r.ago }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"flex:none;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:{{ r.pillBg }};color:{{ r.pillColor }}\">{{ r.category }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- FEEDBACK LIST -->\n    <sc-if value=\"{{ tabFeedback }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Admin · Feedback\" style=\"animation:fadeUp .3s ease both\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:20px\">\n        <h1 style=\"margin:0;font-size:24px;font-weight:700;letter-spacing:-.3px\">Feedback<\u002Fh1>\n        <span style=\"font-size:13px;color:rgba(235,236,240,.4)\">{{ filteredCount }} of {{ totalCount }} entries<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px\">\n        <input value=\"{{ searchVal }}\" sc-camel-on-change=\"{{ onSearch }}\" placeholder=\"Search email or comment…\" style=\"flex:1 1 220px;max-width:340px;background:#17181d;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 14px;font-size:14px;color:#ebecf0;font-family:inherit;min-height:44px;box-sizing:border-box\">\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n          <sc-for list=\"{{ filterChips }}\" as=\"f\" hint-placeholder-count=\"6\">\n            <button sc-camel-on-click=\"{{ f.onClick }}\" style=\"min-height:38px;padding:0 14px;border-radius:99px;border:1px solid {{ f.border }};background:{{ f.bg }};color:{{ f.color }};font-size:13px;font-weight:500;font-family:inherit;cursor:pointer\" style-hover=\"border-color:rgba(255,255,255,.35)\">{{ f.name }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <sc-for list=\"{{ filtered }}\" as=\"r\" hint-placeholder-count=\"6\">\n          <div style=\"background:#17181d;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px 18px;display:flex;gap:14px;align-items:flex-start;box-sizing:border-box\" style-hover=\"border-color:rgba(255,255,255,.16)\">\n            <div style=\"width:34px;height:34px;border-radius:50%;background:#22242b;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:rgba(235,236,240,.75);flex:none\">{{ r.initial }}<\u002Fdiv>\n            <div style=\"min-width:0;flex:1\">\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px;align-items:center\">\n                <span style=\"font-size:13.5px;font-weight:600\">{{ r.email }}<\u002Fspan>\n                <span style=\"font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:{{ r.pillBg }};color:{{ r.pillColor }}\">{{ r.category }}<\u002Fspan>\n                <span style=\"font-size:13px;color:#FBBF24;letter-spacing:1px\">{{ r.starsText }}<\u002Fspan>\n                <span style=\"margin-left:auto;font-size:12px;color:rgba(235,236,240,.35)\">{{ r.ago }}<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"margin:8px 0 0;font-size:14px;line-height:1.5;color:rgba(235,236,240,.75)\">{{ r.comment }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:56px 20px;color:rgba(235,236,240,.4);font-size:14px\">\n            No feedback matches your filters.<br>\n            <button sc-camel-on-click=\"{{ clearFilters }}\" style=\"margin-top:12px;border:none;background:none;color:{{ accent }};font-size:13px;font-weight:500;font-family:inherit;cursor:pointer\" style-hover=\"text-decoration:underline\">Clear filters<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- Prototype screen switcher -->\n<div style=\"position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:rgba(20,21,25,.92);border:1px solid rgba(255,255,255,.12);border-radius:99px;padding:4px;backdrop-filter:blur(8px);z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4)\">\n  <sc-for list=\"{{ protoNav }}\" as=\"p\" hint-placeholder-count=\"3\">\n    <button sc-camel-on-click=\"{{ p.onClick }}\" style=\"min-height:34px;padding:0 15px;border-radius:99px;border:none;background:{{ p.bg }};color:{{ p.color }};font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer\" style-hover=\"color:#fff\">{{ p.label }}<\u002Fbutton>\n  <\u002Fsc-for>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FF6B2C&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#FF6B2C&quot;,&quot;#7C6CFF&quot;,&quot;#2DD4BF&quot;,&quot;#F43F5E&quot;]}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'user', tab: 'overview',\n    email: '', comment: '', rating: 0, category: '', submitted: false, formError: false,\n    search: '', filterCat: 'All',\n    feedback: [\n      {id:1, email:'nadia@brightloop.io', category:'Praise', rating:5, comment:'The new dashboard loads instantly. Huge upgrade from what we used before.', ago:'12 min ago', days:0},\n      {id:2, email:'arjun.k@stackline.dev', category:'Bug', rating:2, comment:'CSV export fails silently when the file has more than 10k rows.', ago:'1 h ago', days:0},\n      {id:3, email:'m.oliveira@ventia.co', category:'Feature request', rating:4, comment:'Would love keyboard shortcuts for approving orders — we process dozens daily.', ago:'3 h ago', days:0},\n      {id:4, email:'sofia@kembel.studio', category:'Complaint', rating:2, comment:'Support took two days to reply about a billing issue. Expected faster turnaround.', ago:'6 h ago', days:0},\n      {id:5, email:'dev.rathi@quorum.app', category:'Bug', rating:3, comment:'Date filter on reports resets after page refresh.', ago:'yesterday', days:1},\n      {id:6, email:'lena@fjordworks.no', category:'Praise', rating:5, comment:'Onboarding was the smoothest I have seen in a B2B tool. Well done.', ago:'yesterday', days:1},\n      {id:7, email:'tomas@grella.mx', category:'Feature request', rating:4, comment:'A dark mode for the reports view would be great for late-night work.', ago:'2 days ago', days:2},\n      {id:8, email:'priya.s@nortal.in', category:'Other', rating:3, comment:'Is there a public roadmap? Would help us plan our integration work.', ago:'2 days ago', days:2},\n      {id:9, email:'jb@caldera.finance', category:'Complaint', rating:1, comment:'Pricing page does not mention the per-seat minimum. Felt misleading.', ago:'3 days ago', days:3},\n      {id:10, email:'hana@mirocorp.jp', category:'Feature request', rating:4, comment:'Please add webhook support for feedback events.', ago:'4 days ago', days:4},\n      {id:11, email:'ollie@britewave.uk', category:'Bug', rating:2, comment:'Notification emails arrive twice for every team mention.', ago:'5 days ago', days:5},\n      {id:12, email:'grace@tallow.co', category:'Praise', rating:5, comment:'Team performance view saved our weekly review meeting an hour.', ago:'6 days ago', days:6},\n      {id:13, email:'sam@driftlane.io', category:'Other', rating:4, comment:'Docs are solid but an API changelog would help.', ago:'1 week ago', days:8},\n      {id:14, email:'ines@volterra.pt', category:'Feature request', rating:3, comment:'Bulk-edit for feedback tags in the admin console.', ago:'2 weeks ago', days:14},\n    ],\n  };\n  CATS = ['Bug','Feature request','Complaint','Praise','Other'];\n  COLORS = {Bug:'#FB7185','Feature request':'#60A5FA',Complaint:'#FBBF24',Praise:'#34D399',Other:'#94A3B8'};\n  PILLS = {Bug:['rgba(251,113,133,.13)','#FB7185'],'Feature request':['rgba(96,165,250,.13)','#60A5FA'],Complaint:['rgba(251,191,36,.13)','#FBBF24'],Praise:['rgba(52,211,153,.13)','#34D399'],Other:['rgba(148,163,184,.13)','#94A3B8']};\n  RATING_LABELS = ['','Very poor','Poor','Okay','Good','Excellent'];\n\n  renderVals() {\n    const s = this.state;\n    const accent = this.props.accent ?? '#FF6B2C';\n    const fb = s.feedback;\n    const go = (screen) => () => this.setState({screen});\n    const setTab = (tab) => () => this.setState({tab});\n    const row = (r) => ({...r, initial: r.email[0].toUpperCase(), starsText: '★'.repeat(r.rating)+'☆'.repeat(5-r.rating), pillBg: this.PILLS[r.category][0], pillColor: this.PILLS[r.category][1]});\n    const q = s.search.trim().toLowerCase();\n    const filtered = fb.filter(r => (s.filterCat==='All'||r.category===s.filterCat) && (!q || r.email.toLowerCase().includes(q) || r.comment.toLowerCase().includes(q))).map(row);\n    const counts = {}; this.CATS.forEach(c => counts[c]=0); fb.forEach(r => counts[r.category]++);\n    const max = Math.max(...Object.values(counts), 1);\n    const catStats = this.CATS.map(c => ({name:c, count:counts[c], color:this.COLORS[c], pctText: Math.round(counts[c]/fb.length*100)+'%', w: Math.round(counts[c]/max*100)+'%'})).sort((a,b)=>b.count-a.count);\n    const thisWeek = fb.filter(r => r.days<=7).length;\n    const avg = (fb.reduce((a,r)=>a+r.rating,0)/fb.length).toFixed(1);\n    const canSubmit = s.email.trim() && s.category && s.rating>0;\n    return {\n      accent,\n      screenUser: s.screen==='user', screenLogin: s.screen==='login', screenAdmin: s.screen==='admin',\n      goLogin: go('login'), goAdmin: () => this.setState({screen:'admin', tab:'overview'}),\n      tabOverview: s.tab==='overview', tabFeedback: s.tab==='feedback',\n      goFeedbackTab: setTab('feedback'),\n      navItems: [\n        {label:'Overview', icon:'◧', active:s.tab==='overview', onClick:setTab('overview')},\n        {label:'Feedback', icon:'☰', active:s.tab==='feedback', onClick:setTab('feedback'), badge:true, badgeText:String(fb.length)},\n      ].map(n => ({...n, bg: n.active?'rgba(255,107,44,.14)':'none', color: n.active?accent:'rgba(235,236,240,.65)', weight: n.active?600:500})),\n      statCards: [\n        {label:'Total feedback', value:String(fb.length), sub:'+3 today', subColor:'#34D399'},\n        {label:'This week', value:String(thisWeek), sub:'vs 9 last week', subColor:'rgba(235,236,240,.4)'},\n        {label:'Avg. rating', value:avg+' / 5', sub:'across all entries', subColor:'rgba(235,236,240,.4)'},\n        {label:'Top category', value:catStats[0].name==='Feature request'?'Features':catStats[0].name, sub:catStats[0].count+' entries', subColor:'rgba(235,236,240,.4)'},\n      ],\n      catStats,\n      recent: fb.slice(0,5).map(row),\n      totalCount: fb.length, filteredCount: filtered.length, filtered, noResults: filtered.length===0,\n      searchVal: s.search, onSearch: e => this.setState({search:e.target.value}),\n      filterChips: ['All', ...this.CATS].map(c => {\n        const active = s.filterCat===c;\n        return {name:c, onClick:()=>this.setState({filterCat:c}), bg:active?accent:'#17181d', color:active?'#141414':'rgba(235,236,240,.7)', border:active?accent:'rgba(255,255,255,.12)'};\n      }),\n      clearFilters: () => this.setState({search:'', filterCat:'All'}),\n      // public form\n      notSubmitted: !s.submitted, submitted: s.submitted,\n      emailVal: s.email, onEmail: e => this.setState({email:e.target.value, formError:false}),\n      commentVal: s.comment, onComment: e => this.setState({comment:e.target.value}),\n      formCats: this.CATS.map(c => {\n        const active = s.category===c;\n        return {name:c, onClick:()=>this.setState({category:c, formError:false}), bg:active?accent:'none', color:active?'#141414':'rgba(235,236,240,.75)', border:active?accent:'rgba(255,255,255,.14)'};\n      }),\n      formStars: [1,2,3,4,5].map(n => ({onClick:()=>this.setState({rating:n, formError:false}), color: n<=s.rating?'#FBBF24':'rgba(255,255,255,.18)', label:n+' star'})),\n      ratingLabel: this.RATING_LABELS[s.rating],\n      formHint: s.formError ? 'Please add your email, a category, and a rating.' : (canSubmit ? 'Ready to send' : ''),\n      formHintColor: s.formError ? '#FB7185' : 'rgba(52,211,153,.8)',\n      submitForm: () => {\n        if (!canSubmit) { this.setState({formError:true}); return; }\n        const entry = {id:Date.now(), email:s.email.trim(), category:s.category, rating:s.rating, comment:s.comment.trim()||'(no comment)', ago:'just now', days:0};\n        this.setState({feedback:[entry, ...s.feedback], submitted:true});\n      },\n      resetForm: () => this.setState({submitted:false, email:'', comment:'', rating:0, category:'', formError:false}),\n      protoNav: [\n        {label:'User form', key:'user'}, {label:'Login', key:'login'}, {label:'Admin', key:'admin'},\n      ].map(p => ({...p, onClick:go(p.key), bg: s.screen===p.key?'rgba(255,255,255,.14)':'none', color: s.screen===p.key?'#fff':'rgba(235,236,240,.5)'})),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
